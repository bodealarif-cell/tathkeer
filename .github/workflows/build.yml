name: Build Tathkeer APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check project structure
      run: |
        echo "=== settings.gradle content ==="
        cat settings.gradle || echo "settings.gradle not found"
        echo "=== app/build.gradle content ==="
        cat app/build.gradle || echo "app/build.gradle not found"

    - name: Fix gradlew line endings and permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Build with Gradle (using bash)
      run: bash ./gradlew :app:assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
