name: Build Tathkeer APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: List root directory
      run: ls -la

    - name: Check app source
      run: ls -R app/src/main/ || echo "app/src/main not found"

    - name: Fix gradlew line endings and permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Setup Gradle wrapper
      run: |
        mkdir -p gradle/wrapper
        curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        fi

    - name: Build with Gradle (explicit task)
      run: bash ./gradlew :app:assembleRelease

    - name: List output files
      if: always()
      run: |
        echo "Contents of app/build:"
        ls -R app/build/ || echo "app/build not found"
        echo "Searching for APK..."
        find . -name "*.apk" 2>/dev/null || echo "No APK found"

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/app-release.apk
