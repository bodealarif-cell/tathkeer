name: Build Tathkeer APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Check project structure
      run: |
        echo "=== settings.gradle content ==="
        cat settings.gradle || echo "settings.gradle not found"
        echo "=== app/build.gradle content ==="
        cat app/build.gradle || echo "app/build.gradle not found"

    - name: Fix gradlew line endings and permissions
      run: |
        sed -i 's/\r$//' gradlew
        chmod +x gradlew

    - name: Ensure gradle wrapper jar exists
      run: |
        mkdir -p gradle/wrapper
        if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
          echo "Downloading gradle-wrapper.jar..."
          curl -L -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
        else
          echo "gradle-wrapper.jar already exists"
        fi
        if [ ! -f gradle/wrapper/gradle-wrapper.properties ]; then
          echo "Creating gradle-wrapper.properties..."
          echo "distributionBase=GRADLE_USER_HOME" > gradle/wrapper/gradle-wrapper.properties
          echo "distributionPath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
          echo "distributionUrl=https\\://services.gradle.org/distributions/gradle-8.6-bin.zip" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStoreBase=GRADLE_USER_HOME" >> gradle/wrapper/gradle-wrapper.properties
          echo "zipStorePath=wrapper/dists" >> gradle/wrapper/gradle-wrapper.properties
        fi

    - name: List available projects
      run: bash ./gradlew projects

    - name: List available tasks
      run: bash ./gradlew tasks

    - name: Build with Gradle (using bash)
      run: bash ./gradlew :app:assembleRelease

    - name: Search for APK files
      id: find_apk
      run: |
        echo "Searching for APK files in the entire project..."
        apk_paths=$(find . -name "*.apk" -type f)
        if [ -n "$apk_paths" ]; then
          echo "Found APK(s):"
          echo "$apk_paths"
          # Save first APK path to environment variable
          first_apk=$(echo "$apk_paths" | head -n1)
          echo "APK_PATH=$first_apk" >> $GITHUB_ENV
        else
          echo "No APK files found."
          exit 1
        fi

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: ${{ env.APK_PATH }}
